name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and typecheck
        run: bun run check

      - name: Bun integration tests
        run: bun test

      - name: Node host integration tests
        run: bun run test:node-integration

      - name: TTY smoke tests
        run: OPENTUI_TTY_SMOKE_INK=0 bun run test:tty-smoke
